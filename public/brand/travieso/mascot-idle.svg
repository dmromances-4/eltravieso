  <g id="bottle-left" stroke="#EF2A2A" stroke-width="3" fill="none">
    <rect x="35" y="185" width="18" height="50" rx="3"/>
    <text x="38" y="210" fill="#EF2A2A" font-size="6" font-family="Arial">CANALLA</text>
  </g>
  <g id="bottle-right" stroke="#EF2A2A" stroke-width="3" fill="none">
    <rect x="147" y="185" width="18" height="50" rx="3"/>
    <text x="149" y="210" fill="#EF2A2A" font-size="5" font-family="Arial">TRAVIESO</text>
  </g>
</svg>
